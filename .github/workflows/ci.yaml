name: CI Workflow

on:
  push: # Trigger on push to any branch for tests
  workflow_dispatch: # Allow manual trigger for INT/PROD promotion
    inputs:
      source_tag:
        description: "Source image tag to promote (e.g., test_2026-02-15_143022)"
        required: true
        type: string

jobs:
  # Run tests (only on push, not needed for promotion)
  test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

  # Build TEST environment (push on main branch)
  build-test:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create custom Docker tag
        id: docker_tag
        run: echo "tag=test_$(date '+%Y-%m-%d_%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: ${{ steps.docker_tag.outputs.tag }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          platforms: |
            linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Promote to INT environment (retag the TEST image, no rebuild)
  build-int:
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create INT tag
        id: docker_tag
        run: echo "tag=int_$(date '+%Y-%m-%d_%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Retag image for INT
        run: |
          echo "Promoting ${{ inputs.source_tag }} to ${{ steps.docker_tag.outputs.tag }}"
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}:${{ steps.docker_tag.outputs.tag }} \
            ghcr.io/${{ github.repository }}:${{ inputs.source_tag }}

  # Promote to PROD environment (retag the same TEST image, no rebuild)
  build-prod:
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    needs: build-int
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PROD tag
        id: docker_tag
        run: echo "tag=prod_$(date '+%Y-%m-%d_%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Retag image for PROD
        run: |
          echo "Promoting ${{ inputs.source_tag }} to ${{ steps.docker_tag.outputs.tag }}"
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}:${{ steps.docker_tag.outputs.tag }} \
            ghcr.io/${{ github.repository }}:${{ inputs.source_tag }}
