name: Toggle Site Banner

on:
  workflow_dispatch:
    inputs:
      enabled:
        description: "Enable banner"
        required: true
        type: boolean
        default: true
      severity:
        description: "Banner severity"
        required: true
        type: choice
        options:
          - info
          - warning
          - critical
        default: warning
      message_de:
        description: "Message (German)"
        required: true
        type: string
      message_fr:
        description: "Message (French)"
        required: true
        type: string
      message_it:
        description: "Message (Italian)"
        required: true
        type: string
      message_en:
        description: "Message (English)"
        required: true
        type: string

jobs:
  update-banner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gitops-main
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/lindas-local-environment
          ref: main
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Generate banner.json
        run: |
          cat > gitops/gitops-main/lindas-admin-ch/banner.json <<'JSONEOF'
          {
            "enabled": ${{ inputs.enabled }},
            "severity": "${{ inputs.severity }}",
            "dismissible": true,
            "messages": {
              "de": "${{ inputs.message_de }}",
              "fr": "${{ inputs.message_fr }}",
              "it": "${{ inputs.message_it }}",
              "en": "${{ inputs.message_en }}"
            }
          }
          JSONEOF

      - name: Commit and push banner config
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops-main/lindas-admin-ch/banner.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "banner: update site banner (${{ inputs.severity }}, enabled=${{ inputs.enabled }})"
          git push
